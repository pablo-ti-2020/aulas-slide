<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciador de Slides</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Barra lateral -->
        <aside class="sidebar" id="sidebar">
            <h2>Temas</h2>
        </aside>

        <!-- Área principal -->
        <main class="slide-area">
            <h1 id="titulo">Selecione um tema</h1>
            <img id="imagem" src="" alt="">
            <p id="descricao"></p>

            <div class="botoes">
                <button id="btnAnterior">Anterior</button>
                <button id="btnProximo">Próximo</button>
            </div>
        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
